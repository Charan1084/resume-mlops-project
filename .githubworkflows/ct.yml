name: Continuous Training Pipeline

on:
  push:
    paths:
      - "data/**"
      - "backend/ct_pipeline.py"

jobs:
  continuous-training:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn joblib mlflow

      - name: Run Continuous Training
        run: |
          cd backend
          python ct_pipeline.py